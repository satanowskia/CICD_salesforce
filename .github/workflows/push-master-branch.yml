# Unique name for this workflow
name: Push to master branch and deploy to production org

# Definition when the workflow should run
on:
    push:
      branches: [ master ]
      paths:
        - 'force-app/**'
            

# Jobs to be executed
jobs:
    deploy-branch-to-production-org:
        runs-on: ubuntu-latest
        if: ${{ github.actor != 'dependabot[bot]' }}
        steps:
            # ✅ Added Node.js setup (required for modern Salesforce CLI and plugins)
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '22'

            # Install Salesforce CLI
            - name: 'Install Salesforce CLI'
              run: |
                  npm install -g @salesforce/cli
                  sf --version

            # install SFDX-Git-Delta plugin - https://github.com/scolladon/sfdx-git-delta
            - name: 'Installing sfdx git delta'
              run: | 
                  echo y | sf plugins install sfdx-git-delta
                  sf plugins 

            # Checkout the source code
            - name: 'Checkout source code'
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            # Store secret for production org
            - name: 'Populate auth file with SFDX_URL secret of the integration and staging orgs'
              shell: bash
              run: |
                  echo "${{ secrets.SFDX_PRODUCTION_URL}}" > ./SFDX_PRODUCTION_URL.txt

            - name: 'Create delta packages for new, modified or deleted metadata'
              run: | 
                  mkdir changed-sources
                  sf sgd source delta --to HEAD --from HEAD^ --output changed-sources --generate-delta --source force-app/

            # Authenticate to org
            - name: 'Authenticate to Production Org'
              run: |
                  sf org login sfdx-url \
                    --sfdx-url-file ./SFDX_PRODUCTION_URL.txt \
                    --alias production \
                    --set-default
              
            - name: 'Deploy the entire branch to Production org'
              run: |
                  sf project deploy start \
                    --source-dir force-app \
                    --test-level RunLocalTests \
                    --json

            - name: 'Deploy destructive changes (if any) to Production org'
              run: |
                  sf project deploy start \
                    --metadata-dir changed-sources/destructiveChanges \
                    --ignore-warnings
